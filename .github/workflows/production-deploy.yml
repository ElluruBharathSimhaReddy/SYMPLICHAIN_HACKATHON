name: Deploy Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-south-1
      S3_BUCKET: ${{ secrets.PRODUCTION_S3_BUCKET }}
      EC2_HOST: ${{ secrets.PRODUCTION_EC2_HOST }}
      EC2_USER: ubuntu
      APP_DIR: /srv/symflow
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend smoke checks
        run: |
          python -m compileall .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build
          else
            echo "No frontend package.json found, skipping frontend build"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync built frontend to S3
        run: |
          if [ -d build ]; then
            aws s3 sync build/ s3://$S3_BUCKET --delete
          elif [ -d dist ]; then
            aws s3 sync dist/ s3://$S3_BUCKET --delete
          else
            echo "No build output found, skipping S3 sync"
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      - name: Deploy backend on EC2
        run: |
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            set -e
            cd /srv/symflow
            git fetch origin
            git checkout main
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart gunicorn
            sudo systemctl restart celery
            sudo systemctl restart nginx
          EOF
